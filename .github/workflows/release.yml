name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            electron/package.json

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.11.0

      - name: Build backend exe (PyInstaller)
        working-directory: backend
        run: pyinstaller AuraBackTestServer.spec --noconfirm --clean

      - name: Move backend dist
        shell: pwsh
        run: |
          if (Test-Path backend-dist) { Remove-Item -Recurse -Force backend-dist }
          Move-Item backend/dist/AuraBackTestServer backend-dist

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install electron deps
        working-directory: electron
        run: npm install

      - name: Build installer + publish
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release

      - name: Upload artifact (debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-debug
          path: release/
          if-no-files-found: ignore
